<!DOCTYPE html>
<html>
    <head>
        <style>
            .Square {
            width: 100px;
            height: 100px;
            background-color: cyan;
            margin: 100px auto;
            animation: Square 2s linear infinite;
            }
        @keyframes Square {
           from {
            transform: rotate(0deg);
            }
           to {
            transform: rotate(360deg);
            }
         }
        </style>
    </head>
    <body style="background-color: #0f172a;">
        <h1 style="font-family: Arial, sans-serif; font-style: normal; color: #38bdf8; text-align: center; font-size: 38px; text-decoration: underline;">
            A Square that Continuously rotates using CSS Animation
        </h1>
        <div class="Square"></div>
    </body>
</html>
