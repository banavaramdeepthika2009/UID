<!DOCTYPE html>
<html>
    <head>
        <style>
            .Circle{
                width:100px;
                height:100px;
                background-color: gold;
                border-radius: 47%;
                position:relative;
                margin: auto;
                animation-name: Rotate;
                animation-duration: 5s;
                animation-timing-function: ease;
                animation-iteration-count: infinite;
            }
            @keyframes Rotate {
                0%{
                    top:0;
                    left:0;
                    transform: rotate(0deg) translate(0);
                }
                
                100% {
                   top: 0;
                   left: 0;
                   transform: rotate(360deg) translate(180px);
                }
            }
        </style>
    </head>
    <body style="background-color: #1e1e2f;">
        <h1 style="font-family: Arial, sans-serif; font-style: normal; color: #ffcc00; text-align: center; font-size: 40px; text-decoration: underline;">
            Moving rotating circle
        </h1>
        <p style="font-size: 22px; text-align: center; font-style: normal; color: #ffffff;">
            Watch the ball move horizontally and rotate at the same time
        </p>
        <p style="font-size: 22px; text-align: center; font-style: normal; color: #dddddd;">
            This animation combines transition and rotation using CSS
        </p>
        <div class ="Circle"></div>
    </body>
</html>
